<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .hk-bg { fill: #0a1628; }
      .hk-circle { fill: none; stroke: #c9a84c; stroke-width: 2; }
      .hk-text { font-family: 'Arial', sans-serif; font-size: 48px; font-weight: bold; fill: #c9a84c; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>
  <rect class="hk-bg" width="100" height="100"/>
  <circle class="hk-circle" cx="50" cy="50" r="45"/>
  <text class="hk-text" x="50" y="50">HK</text>
</svg>
